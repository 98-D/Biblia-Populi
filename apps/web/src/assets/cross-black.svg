<!-- blood-cross.svg — detailed blood red Christian cross -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Blood Red Christian Cross">

    <defs>
        <!-- Deep blood red gradient -->
        <linearGradient id="bloodRed" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8b0000"/>
            <stop offset="45%" stop-color="#b11212"/>
            <stop offset="75%" stop-color="#7a0000"/>
            <stop offset="100%" stop-color="#4a0000"/>
        </linearGradient>

        <!-- Subtle highlight gradient -->
        <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff4d4d" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>

        <!-- Inner shadow + depth -->
        <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
            <feOffset dx="0" dy="6"/>
            <feGaussianBlur stdDeviation="8" result="offset-blur"/>
            <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
            <feFlood flood-color="#000000" flood-opacity="0.35"/>
            <feComposite operator="in" in2="inverse"/>
            <feComposite operator="over" in2="SourceGraphic"/>
        </filter>

        <!-- Soft outer glow -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Cross shape -->
    <g filter="url(#glow)">
        <path
                d="
        M 224 64
        C 224 46 238 32 256 32
        C 274 32 288 46 288 64
        L 288 192
        L 384 192
        C 402 192 416 206 416 224
        C 416 242 402 256 384 256
        L 288 256
        L 288 448
        C 288 466 274 480 256 480
        C 238 480 224 466 224 448
        L 224 256
        L 128 256
        C 110 256 96 242 96 224
        C 96 206 110 192 128 192
        L 224 192
        Z
      "
                fill="url(#bloodRed)"
                filter="url(#depth)"
        />
    </g>

    <!-- Soft diagonal highlight overlay -->
    <path
            d="
      M 224 64
      L 288 64
      L 288 256
      L 224 256
      Z
    "
            fill="url(#highlight)"
            opacity="0.25"
    />

</svg>